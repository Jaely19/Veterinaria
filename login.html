<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - Patitas Sanas</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=IBM+Plex+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* ================= VARIABLES Y RESET ================= */
        :root {
            --primary-color: #012b81;
            --secondary-color: #3CCAFF; 
            --accent-color: #FF9B1B; 
            --bg-light: #f7f7ff;
            --text-dark: #292faa;
            --text-gray: #4b4d75;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito Sans', sans-serif; 
            background: linear-gradient(135deg, rgba(1, 43, 129, 0.8), rgba(60, 202, 255, 0.8)), url('https://images.unsplash.com/photo-1543322748-33df6d3db806?auto=format&fit=crop&w=1200&q=80') center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dark);
        }

        /* ================= CONTENEDOR LOGIN ================= */
        .auth-container {
            background: #fff;
            width: 100%;
            max-width: 450px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .auth-header {
            text-align: center;
            padding: 30px 20px 20px;
        }

        .auth-header h1 {
            font-family: 'IBM Plex Sans', sans-serif;
            color: var(--primary-color);
            font-size: 1.8rem;
        }
        .auth-header h1 span { color: var(--accent-color); }

        /* ================= PESTAÑAS ================= */
        .tabs {
            display: flex;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-gray);
            transition: 0.3s;
        }
        .tab.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--accent-color);
        }

        /* ================= FORMULARIOS ================= */
        .form-box {
            padding: 30px;
            display: none;
        }
        .form-box.active { display: block; }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .input-group input {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: inherit;
            font-size: 1rem;
        }
        .input-group input:focus {
            border-color: var(--secondary-color);
            outline: none;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary-color);
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover { background: var(--accent-color); }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-gray);
            text-decoration: underline;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <h1>Patitas<span> Sanas</span></h1>
            <p>Portal de Acceso</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
            <div class="tab" onclick="switchTab('register')">Registrarse</div>
        </div>

        <div id="login-form" class="form-box active">
            <p id="login-error" class="error-msg">Correo o contraseña incorrectos.</p>
            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" placeholder="********" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
            <a href="index.html" class="back-home">← Volver al inicio</a>
        </div>

        <div id="register-form" class="form-box">
            <form onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label>Tu Nombre Completo</label>
                    <input type="text" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label>Nombre de tu Mascota</label>
                    <input type="text" placeholder="Ej. Toby" required>
                </div>
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="input-group">
                    <label>Crear Contraseña</label>
                    <input type="password" placeholder="Mínimo 8 caracteres" required>
                </div>
                <button type="submit" class="btn-submit" style="background-color: var(--accent-color);">Crear Cuenta</button>
            </form>
            <a href="index.html" class="back-home">← Volver al inicio</a>
        </div>
    </div>

    <script>
        // Cambiar entre Iniciar Sesión y Registro
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-box').forEach(f => f.classList.remove('active'));
            document.getElementById('login-error').style.display = 'none';

            if (tabName === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        // Simulación de Base de Datos Local
        function handleLogin(e) {
            e.preventDefault(); 
            
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const password = document.getElementById('login-password').value.trim();
            const errorMsg = document.getElementById('login-error');

            errorMsg.style.display = 'none';

            // Regla 1: Veterinario
            if (email === 'vet@gmail.com' && password === '12345') {
                window.location.href = 'dashboard-vet.html';
            } 
            // Regla 2: Recepción
            else if (email === 'rec@gmail.com' && password === '12345') {
                window.location.href = 'dashboard-recepcion.html';
            } 
            // Regla 3: Si se equivoca de contraseña en las cuentas de admin
            else if ((email === 'vet@gmail.com' || email === 'rec@gmail.com') && password !== '12345') {
                errorMsg.style.display = 'block';
            }
            // Regla 4: Cualquier otro correo es tratado como Paciente/Cliente
            else {
                window.location.href = 'citas.html';
            }
        }

        // Registro de un nuevo paciente
        function handleRegister(e) {
            e.preventDefault();
            alert('¡Cuenta creada con éxito! Ahora puedes agendar tus citas.');
            window.location.href = 'citas.html';
        }
    </script>
</body>
</html>
